
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
        @for (item of items; track item.nombre) {
        <tr [ngClass]="{'oferta': item.oferta}">
            <td><img [src]="item.img" [alt]="item.nombre" width="100"></td>
            <td>{{ item.nombre }}</td>
            <td>{{ item.tipo }}</td>
            <td>{{ item.precio | currency:'$':'symbol':'1.2-2' }}</td>
            @if (item.stock > 0) {
                <td><span class="badge bg-success">Disponible</span></td>
            } @else {
                <td><span class="badge bg-danger">Agotado</span></td>
            }
            <td>
                <app-input-integer  [(cantidad)]="item.cantidad" [max]="item.stock" (maxReached)="maxReached($event)"></app-input-integer>
                <button class="btn btn-primary" (click)="addToCart(item)">Comprar</button>
            </td>
        </tr>
    } @empty {
        <tr>
            <td colspan="6" class="text-center">No hay items disponibles</td>
        </tr>
    }
    </tbody> 
</table>
